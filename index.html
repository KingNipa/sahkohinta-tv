<!doctype html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1217">
  <title>S&auml;hk&ouml;nhinta TV</title>
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="shortcut icon" href="./icon.svg">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app" role="main" aria-live="polite">
    <p class="slot" id="slotText">klo -- - --: hinta</p>
    <h1 class="price" id="priceText">--,--</h1>
    <p class="unit">snt/kWh</p>

    <section class="summary-row" aria-label="P&auml;iv&auml;n yhteenveto">
      <article class="summary-card">
        <h2 class="summary-title">Halvin hinta</h2>
        <p class="summary-time" id="minHourText">klo -- - --</p>
        <p class="summary-value" id="minValueText">--,--</p>
        <p class="summary-unit">snt/kWh</p>
      </article>

      <article class="summary-card">
        <h2 class="summary-title">Kallein hinta</h2>
        <p class="summary-time" id="maxHourText">klo -- - --</p>
        <p class="summary-value" id="maxValueText">--,--</p>
        <p class="summary-unit">snt/kWh</p>
      </article>

      <article class="summary-card">
        <h2 class="summary-title">Keskihinta</h2>
        <p class="summary-time">t&auml;n&auml;&auml;n</p>
        <p class="summary-value" id="avgValueText">--,--</p>
        <p class="summary-unit">snt/kWh</p>
      </article>
    </section>
  </main>

  <p class="updated" id="updatedText">P&auml;ivitetty: --:--</p>
  <p class="status" id="statusText">Yhteys OK</p>

  <script src="./app.js"></script>
</body>
</html>
